<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Z-Notes | Annual Final Exams</title>
    <style>
        :root {
            --deep-green: #064e3b;
            --fresh-green: #059669;
            --accent-yellow: #fbbf24;
            --glass-white: rgba(255, 255, 255, 0.1);
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            background: radial-gradient(at top left, #065f46, transparent),
                        radial-gradient(at bottom right, #1e3a8a, transparent),
                        radial-gradient(at bottom left, #059669, transparent);
            background-color: #064e3b;
            background-attachment: fixed;
            height: 100vh;
            display: flex;
            flex-direction: column;
            color: white;
            overflow: hidden;
        }

        header {
            background: var(--glass-white);
            backdrop-filter: blur(15px);
            padding: 10px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            z-index: 100;
        }

        .logo-link {
            display: flex;
            align-items: center;
            text-decoration: none;
            gap: 12px;
        }

        .clean-logo {
            height: 50px;
            width: auto;
            filter: brightness(0) invert(1);
        }

        .logo-text {
            font-size: 22px;
            font-weight: 800;
            color: white;
            letter-spacing: 1.5px;
        }

        .back-btn {
            color: white;
            text-decoration: none;
            font-weight: bold;
            background: var(--glass-white);
            padding: 8px 20px;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            transition: 0.3s;
        }

        .exam-layout {
            display: flex;
            flex: 1;
            padding: 20px;
            gap: 20px;
            overflow: hidden;
        }

        .sidebar {
            width: 320px;
            background: var(--glass-white);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 20px;
            overflow-y: auto;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .sidebar h2 {
            margin-top: 0;
            font-size: 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding-bottom: 10px;
        }

        .sem-title {
            color: var(--accent-yellow);
            font-size: 16px;
            font-weight: bold;
            margin: 25px 0 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .sem-title::before {
            content: '';
            display: inline-block;
            width: 4px;
            height: 18px;
            background: var(--accent-yellow);
            border-radius: 2px;
        }

        .exam-link {
            background: rgba(255, 255, 255, 0.05);
            padding: 12px 15px;
            margin-bottom: 10px;
            border-radius: 12px;
            cursor: pointer;
            transition: 0.3s;
            font-size: 14px;
            border: 1px solid transparent;
            display: flex;
            justify-content: space-between;
        }

        .exam-link:hover {
            background: var(--fresh-green);
            transform: translateX(5px);
        }

        .exam-link.active {
            background: white;
            color: var(--deep-green);
            font-weight: bold;
        }

        .viewer-area {
            flex: 1;
            background: white;
            border-radius: 25px;
            overflow: hidden;
            box-shadow: 0 20px 50px rgba(0,0,0,0.4);
            position: relative;
        }

        #pdf-viewer {
            width: 100%;
            height: 100%;
            border: none;
            display: none; 
        }

        .welcome-msg {
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: #555;
            text-align: center;
            padding: 40px;
        }
    </style>
</head>
<body>

    <header>
        <a href="dashboard.html" class="logo-link">
            <img src="Logo2.png" alt="Z-Notes Logo" class="clean-logo">
            <span class="logo-text">Z-NOTES</span>
        </a>
        <a href="javascript:history.back()" class="back-btn">Back</a>
    </header>

    <main class="exam-layout">
        <aside class="sidebar">
            <h2>Grade 9 HPE Finals</h2>
            
            <div class="sem-title">1st Semester</div>
            <div class="exam-link" onclick="openExam('hpe9_s1_2017.pdf', this)">
                <span>2017 Final Exam</span> <span>PDF</span>
            </div>
            <div class="exam-link" onclick="openExam('hpe9_s1_2018.pdf', this)">
                <span>2018 Final Exam</span> <span>PDF</span>
            </div>

            <div class="sem-title">2nd Semester</div>
            <div class="exam-link" onclick="openExam('hpe9_s2_2017.pdf', this)">
                <span>2017 Final Exam</span> <span>PDF</span>
            </div>
            <div class="exam-link" onclick="openExam('hpe9_s2_2018.pdf', this)">
                <span>2018 Final Exam</span> <span>PDF</span>
            </div>
        </aside>

        <section class="viewer-area">
            <div id="placeholder" class="welcome-msg">
                <h1>📚</h1>
                <h2 style="color: #064e3b;">የፈተና ማህደር</h2>
                <p>ለመጀመር ከግራ በኩል ማየት የሚፈልጉትን የሴሚስተር ፈተና ይምረጡ።</p>
            </div>
            <iframe id="pdf-viewer"></iframe>
        </section>
    </main>

    <script>
        function openExam(url, element) {
            const viewer = document.getElementById('pdf-viewer');
            const placeholder = document.getElementById('placeholder');

            viewer.src = url;
            viewer.style.display = 'block';
            placeholder.style.display = 'none';

            document.querySelectorAll('.exam-link').forEach(link => {
                link.classList.remove('active');
            });
            element.classList.add('active');
        }
    </script>
</body>
</html>
