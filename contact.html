<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Z-Notes | አግኙን</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background: linear-gradient(45deg, #dfecf3, #e8f5e9);
            display: flex;
            flex-direction: column; 
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        
        .page-header {
            text-align: center;
            margin-bottom: 30px;
            animation: fadeInDown 1s ease;
        }

        .page-header h1 {
            color: #1a2a6c;
            font-size: 42px;
            margin: 0;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .page-header .underline {
            width: 80px;
            height: 4px;
            background: #28a745;
            margin: 10px auto;
            border-radius: 2px;
        }

       
        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .container {
            display: flex;
            width: 950px;
            background: white;
            border-radius: 25px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.15);
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.3);
        }

        .left-side {
            padding: 50px;
            flex: 1.3;
            background: linear-gradient(to bottom right, #ffffff, #f0f7ff);
        }

        .left-side h2 { color: #1a2a6c; font-size: 28px; margin-bottom: 10px; }

        input, textarea {
            width: 100%;
            padding: 15px;
            margin: 12px 0;
            border: 1px solid #d1d9e6;
            border-radius: 12px;
            background: #fcfdfe;
            box-sizing: border-box;
            transition: 0.3s;
        }

        input:focus, textarea:focus {
            border-color: #0056b3;
            outline: none;
            background: white;
            box-shadow: 0 0 10px rgba(0,86,179,0.1);
        }

        .btn {
            background: linear-gradient(135deg, #28a745, #1e7e34);
            color: white;
            padding: 16px 35px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-weight: bold;
            font-size: 16px;
            margin-top: 15px;
            transition: 0.3s;
        }

        .btn:hover {
            animation: moveBtn 0.6s ease-in-out infinite;
        }

        @keyframes moveBtn {
            0% { transform: translateY(0); }
            50% { transform: translateY(-3px) translateX(2px); }
            100% { transform: translateY(0); }
        }

        .right-side {
            padding: 50px;
            flex: 0.7;
            background: linear-gradient(135deg, #1a2a6c, #28a745);
            color: white;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .social-card {
            display: flex;
            align-items: center;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            color: white;
            text-decoration: none;
            padding: 18px;
            margin: 12px 0;
            border-radius: 15px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            transition: 0.4s;
        }

        .social-card:hover {
            background: white;
            color: #1a2a6c;
            transform: scale(1.05);
        }

        @media (max-width: 800px) {
            .container { flex-direction: column; width: 95%; }
            .page-header h1 { font-size: 32px; }
        }
    </style>
</head>
<body>

    <div class="page-header">
        <h1>CONTACT US</h1>
        <div class="underline"></div>
        <p style="color: #555;">Z-Notes | እኛን ለማግኘት</p>
    </div>

    <div class="container">
        <div class="left-side">
            <h2>መልዕክት ይላኩልን</h2>
            <p>ጥያቄዎን እዚህ ያስፍሩ፣ በቅርቡ እንመልሳለን።</p>
            <form>
                <input type="text" placeholder="ሙሉ ስም" required>
                <input type="email" placeholder="ኢሜይል አድራሻ" required>
                <textarea rows="4" placeholder="ምን ልርዳዎት?" required></textarea>
                <button type="submit" class="btn">መልዕክቱን ላክ</button>
            </form>
        </div>

        <div class="right-side">
            <h2>አድራሻ</h2>
            <p>📍 ደሴ ፣ ኢትዮጵያ</p>
            <p>📞 +251 987852532</p>
            
            <h3 style="margin-top: 30px;">ሶሻል ሚዲያ</h3>
            <a href="#" class="social-card">✈️ Telegram</a>
            <a href="#" class="social-card">💬 WhatsApp</a>
            <a href="#" class="social-card">📷 Instagram</a>
        </div>
    </div>
<footer style="background: #1a2a6c; color: white; text-align: center; padding: 30px; margin-top: 50px;">
    <p style="margin: 0;">© 2026 Z-Notes | እውቀት ብርሃን ነው!</p>
</footer>
</body>
</html>
